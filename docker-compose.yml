version: '3.8'

services:
  db:
    image: postgres:16-alpine
    container_name: apistreamhub-db
    environment:
      POSTGRES_DB: apistreamhub
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
    ports:
      - "5434:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres"]
      interval: 5s
      timeout: 5s
      retries: 10
    networks:
      - apistreamhub-network

  api:
    build: .
    container_name: apistreamhub-api
    ports:
      - "8001:8000"
    environment:
      - DATABASE_URL=postgresql+asyncpg://postgres:postgres@db:5432/apistreamhub
      - JWT_SECRET_KEY=videotron-secret-key-change-in-production
      - DEBUG=True
    depends_on:
      db:
        condition: service_healthy
    networks:
      - apistreamhub-network
    restart: unless-stopped

volumes:
  postgres_data:

networks:
  apistreamhub-network:
    driver: bridge
